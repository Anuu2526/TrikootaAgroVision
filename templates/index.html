<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trikoota | Crop Disease Detection</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .glass-effect { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); }
    </style>
</head>
<body class="bg-stone-50 min-h-screen text-gray-900">

    <nav class="bg-green-800 text-white shadow-md p-4 mb-10">
        <div class="max-w-4xl mx-auto flex justify-between items-center">
            <h1 class="text-xl font-bold flex items-center gap-2">
                🌿 Trikoota <span class="font-light text-green-200">Plant Health</span>
            </h1>
            <span class="text-xs bg-green-700 px-3 py-1 rounded-full border border-green-500">AI Diagnostic v1.0</span>
        </div>
    </nav>

    <main class="max-w-md mx-auto px-4 pb-10 mt-6"> <div class="bg-white rounded-xl shadow-lg border border-gray-100 p-5 transition-all">
        <div class="text-center mb-4">
            <h2 class="text-lg font-bold text-gray-800">Analyze Crop Leaf</h2>
            <p class="text-gray-400 text-xs">Upload leaf photo for diagnosis</p>
        </div>

        <form method="POST" enctype="multipart/form-data" class="space-y-4">
            <div class="group relative border-2 border-dashed border-gray-200 rounded-lg p-4 hover:border-green-500 hover:bg-green-50/30 transition-all cursor-pointer text-center">
                <input type="file" name="file" required class="absolute inset-0 w-full h-full opacity-0 cursor-pointer">
                <div class="flex flex-col items-center gap-1">
                    <div class="w-8 h-8 bg-green-100 text-green-600 rounded-full flex items-center justify-center">
                        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-4 h-4">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M12 16.5V9.75m0 0l3 3m-3-3l-3 3M6.75 19.5a4.5 4.5 0 01-1.41-8.775 5.25 5.25 0 0110.233-2.33 3 3 0 013.758 3.848A3.752 3.752 0 0118 19.5H6.75z" />
                        </svg>
                    </div>
                    <p class="text-xs font-semibold text-gray-600 tracking-tight">Click or drag image</p>
                </div>
            </div>

            <button type="submit" class="w-full bg-green-600 hover:bg-green-700 text-white text-sm font-bold py-2.5 rounded-lg shadow-md transition-all active:scale-95">
                Start Analysis
            </button>
        </form>
    </div>

    {% if prediction %}
    <div class="mt-6 animate-in fade-in slide-in-from-bottom-2 duration-500">
        <div class="bg-white rounded-xl shadow-lg border border-green-100 overflow-hidden">
            <div class="flex items-center p-4 gap-4">
                <img src="{{ image }}" class="h-20 w-20 rounded-lg object-cover border" alt="Uploaded leaf">
                <div class="flex-1">
                    <span class="text-[9px] uppercase font-bold text-green-600 bg-green-50 px-1.5 py-0.5 rounded">Result</span>
                    <h2 class="text-base font-bold text-gray-800 leading-tight">{{ prediction }}</h2>
                    <div class="flex items-center gap-2 mt-1">
                        <div class="flex-1 bg-gray-100 rounded-full h-1.5">
                            <div class="bg-green-500 h-1.5 rounded-full" style="width: {{ confidence }}%"></div>
                        </div>
                        <span class="text-[10px] font-bold text-gray-500">{{ confidence }}%</span>
                    </div>
                </div>
            </div>
            <div class="bg-stone-50 p-3 border-t border-gray-50">
                <p class="text-[10px] text-gray-400 uppercase font-bold">Nutrient Advisory</p>
                <p class="text-xs text-gray-700 mt-0.5 italic">"{{ nutrient }}"</p>
            </div>
        </div>
    </div>
    {% endif %}
</main>

</body>
</html>
